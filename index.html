<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LUMOUS マニュアル図解メーカー</title>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
    <style>
        :root {
            --primary: #685021;
            --primary-light: #c39f59;
            --primary-gradient: linear-gradient(135deg, #c39f59, #8b6f47);
            --bg-light: #f8f9fa;
            --bg-white: #ffffff;
            --text-dark: #333333;
            --text-muted: #6c757d;
            --border: #e9ecef;
            --shadow: rgba(0, 0, 0, 0.08);
            --radius: 16px;
            --radius-sm: 8px;
            --transition: all 0.3s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Hiragino Sans', 'Meiryo', sans-serif;
            background: var(--bg-light);
            color: var(--text-dark);
            line-height: 1.6;
        }

        /* ===== Header ===== */
        .header {
            background: var(--bg-white);
            border-bottom: 1px solid var(--border);
            padding: 20px 32px;
            box-shadow: 0 2px 20px var(--shadow);
        }

        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            font-size: 28px;
            font-weight: 300;
            letter-spacing: 4px;
            color: var(--primary);
        }

        .logo-sub {
            font-size: 12px;
            letter-spacing: 6px;
            color: var(--primary-light);
            margin-top: 2px;
        }

        .api-key-area {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .api-key-input {
            width: 280px;
            padding: 10px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            transition: var(--transition);
        }

        .api-key-input:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(195, 159, 89, 0.1);
        }

        .api-key-save {
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .api-key-save:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(195, 159, 89, 0.4);
        }

        .api-status {
            font-size: 12px;
            color: var(--text-muted);
        }

        .api-status.connected {
            color: #10b981;
        }

        /* ===== Main Layout ===== */
        .main {
            max-width: 1600px;
            margin: 0 auto;
            padding: 32px;
            display: flex;
            gap: 32px;
        }

        /* ===== Input Panel ===== */
        .input-panel {
            width: 400px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 20px;
            transition: width 0.3s ease, opacity 0.3s ease;
            overflow: hidden;
        }

        .input-panel.collapsed {
            width: 0;
            opacity: 0;
            padding: 0;
            gap: 0;
            pointer-events: none;
        }

        .input-toggle-btn {
            position: fixed;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 100;
            background: var(--primary-gradient);
            color: white;
            border: none;
            width: 32px;
            height: 64px;
            border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
            cursor: pointer;
            font-size: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(104, 80, 33, 0.3);
            transition: var(--transition);
        }

        .input-toggle-btn:hover {
            width: 38px;
        }

        .panel-card {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: 0 4px 30px var(--shadow);
        }

        .panel-title {
            font-size: 13px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 16px;
        }

        .input-textarea {
            width: 100%;
            min-height: 200px;
            padding: 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-family: inherit;
            line-height: 1.8;
            resize: vertical;
            transition: var(--transition);
        }

        .input-textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(195, 159, 89, 0.1);
        }

        .input-textarea::placeholder {
            color: var(--text-muted);
        }

        .diagram-type {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }

        .type-btn {
            padding: 8px 16px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 20px;
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
        }

        .type-btn:hover {
            border-color: var(--primary-light);
        }

        .type-btn.selected {
            background: var(--primary-gradient);
            color: white;
            border-color: transparent;
        }

        .btn-generate {
            width: 100%;
            background: var(--primary-gradient);
            color: white;
            border: none;
            padding: 16px;
            border-radius: var(--radius-sm);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            letter-spacing: 1px;
        }

        .btn-generate:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(104, 80, 33, 0.3);
        }

        .btn-generate:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-generate.loading {
            position: relative;
            color: transparent;
        }

        .btn-generate.loading::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 24px;
            height: 24px;
            margin: -12px 0 0 -12px;
            border: 3px solid rgba(255,255,255,0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* ===== Templates ===== */
        .templates {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .template-btn {
            padding: 12px 16px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            text-align: left;
            color: var(--text-dark);
        }

        .template-btn:hover {
            border-color: var(--primary-light);
            transform: translateX(4px);
            box-shadow: 0 4px 15px var(--shadow);
        }

        /* ===== Link Panel (Right) ===== */
        .link-panel {
            width: 280px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-panel .panel-card {
            position: sticky;
            top: 32px;
        }

        .link-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 50vh;
            overflow-y: auto;
        }

        .link-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 10px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 12px;
            transition: var(--transition);
        }

        .link-item:hover {
            border-color: var(--primary-light);
        }

        .link-item-name {
            font-weight: 600;
            color: var(--text-dark);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .link-item a {
            color: var(--primary-light);
            text-decoration: none;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex: 1;
            min-width: 0;
        }

        .link-item a:hover {
            text-decoration: underline;
        }

        .link-item-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 14px;
            padding: 2px;
            flex-shrink: 0;
            transition: var(--transition);
        }

        .link-item-delete:hover {
            color: #ef4444;
        }

        .link-add-form {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 8px;
        }

        .link-add-form input {
            padding: 6px 10px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 12px;
            font-family: inherit;
        }

        .link-add-form input:focus {
            outline: none;
            border-color: var(--primary-light);
        }

        .link-add-btn {
            padding: 6px 12px;
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: var(--radius-sm);
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
        }

        .link-add-btn:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(104, 80, 33, 0.3);
        }

        .link-empty {
            text-align: center;
            padding: 16px;
            color: var(--text-muted);
            font-size: 12px;
        }

        .link-badge {
            display: inline-block;
            background: var(--primary-gradient);
            color: white;
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 10px;
            margin-left: 4px;
        }

        /* ===== Output Panel ===== */
        .output-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 0;
        }

        .output-toolbar {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 8px 12px;
            margin-bottom: 12px;
            box-shadow: 0 2px 10px var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 2px;
        }

        .toolbar-sep {
            width: 1px;
            height: 20px;
            background: var(--border);
            margin: 0 6px;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: none;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-muted);
            position: relative;
        }

        .btn-icon:hover {
            background: var(--bg-light);
            color: var(--primary);
        }

        .btn-icon.active {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-icon .tooltip {
            display: none;
            position: absolute;
            bottom: -28px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--text-dark);
            color: white;
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 4px;
            white-space: nowrap;
            z-index: 100;
            pointer-events: none;
        }

        .btn-icon:hover .tooltip {
            display: block;
        }

        .btn-save-group {
            display: flex;
            gap: 2px;
            margin-left: 6px;
        }

        .btn-save {
            padding: 6px 12px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            white-space: nowrap;
        }

        .btn-save:hover {
            transform: translateY(-1px);
        }

        .btn-save.primary {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-save.secondary {
            background: var(--primary);
            color: white;
        }

        /* Keep for non-toolbar uses */
        .btn-action {
            padding: 6px 12px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: var(--transition);
            color: var(--text-dark);
            white-space: nowrap;
        }

        .btn-action:hover {
            border-color: var(--primary-light);
            color: var(--primary);
        }

        .output-content {
            background: var(--bg-white);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: 0 4px 30px var(--shadow);
            min-height: 400px;
        }

        .output-placeholder {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 400px;
            color: var(--text-muted);
            text-align: center;
            gap: 16px;
        }

        .output-placeholder-icon {
            font-size: 48px;
            opacity: 0.3;
        }

        /* ===== Manual Output Styles ===== */
        .manual-output h1 {
            font-size: 24px;
            font-weight: 600;
            color: var(--primary);
            margin-bottom: 8px;
            padding-bottom: 12px;
            border-bottom: 2px solid var(--primary-light);
        }

        .manual-output h2 {
            font-size: 20px;
            font-weight: 600;
            color: var(--primary);
            margin: 28px 0 12px;
            padding-left: 12px;
            border-left: 4px solid var(--primary-light);
        }

        .manual-output h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-dark);
            margin: 20px 0 8px;
        }

        .manual-output p {
            margin: 8px 0;
            line-height: 1.8;
        }

        .manual-output ul, .manual-output ol {
            margin: 8px 0 8px 24px;
            line-height: 2;
        }

        .manual-output li {
            margin: 4px 0;
        }

        .manual-output strong {
            color: var(--primary);
        }

        .manual-output a {
            color: var(--primary);
            text-decoration: underline;
            word-break: break-all;
        }

        .manual-output a:hover {
            color: var(--primary-light);
        }

        .manual-output .mermaid-container {
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 24px;
            margin: 20px 0;
            text-align: center;
        }

        .manual-output .step-box {
            background: var(--bg-light);
            border-left: 4px solid var(--primary-light);
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            margin: 12px 0;
        }

        .manual-output .note-box {
            background: #fff8e1;
            border-left: 4px solid #f59e0b;
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            margin: 12px 0;
        }

        .manual-output .warning-box {
            background: #fef2f2;
            border-left: 4px solid #ef4444;
            border-radius: var(--radius-sm);
            padding: 16px 20px;
            margin: 12px 0;
        }

        .manual-output table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
        }

        .manual-output th {
            background: var(--primary-gradient);
            color: white;
            padding: 12px 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 600;
        }

        .manual-output td {
            padding: 10px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .manual-output tr:hover td {
            background: var(--bg-light);
        }

        /* ===== History ===== */
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 300px;
            overflow-y: auto;
        }

        .history-item {
            padding: 12px 16px;
            background: var(--bg-light);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .history-item:hover {
            border-color: var(--primary-light);
            transform: translateX(4px);
        }

        .history-title {
            font-size: 14px;
            font-weight: 600;
        }

        .history-date {
            font-size: 11px;
            color: var(--text-muted);
        }

        .history-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .history-rename,
        .history-delete {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
            transition: var(--transition);
        }

        .history-rename:hover {
            color: var(--primary-light);
        }

        .history-delete:hover {
            color: #ef4444;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--primary);
            color: white;
            padding: 14px 24px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s ease;
            z-index: 1000;
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        /* ===== Print ===== */
        @media print {
            .header, .input-panel, .output-actions, .toast, .link-panel, .input-toggle-btn {
                display: none !important;
            }
            .main {
                padding: 0;
            }
            .output-panel {
                width: 100%;
            }
            .output-content {
                box-shadow: none;
                padding: 0;
            }
        }

        /* ===== Responsive ===== */
        @media (max-width: 1200px) {
            .link-panel {
                width: 220px;
            }
        }
        @media (max-width: 900px) {
            .main {
                flex-direction: column;
                padding: 16px;
            }
            .input-panel {
                width: 100%;
            }
            .input-panel.collapsed {
                width: 100%;
                height: 0;
            }
            .link-panel {
                width: 100%;
            }
            .header-inner {
                flex-direction: column;
                gap: 12px;
            }
            .api-key-input {
                width: 200px;
            }
            .input-toggle-btn {
                position: static;
                transform: none;
                width: 100%;
                height: 36px;
                border-radius: var(--radius-sm);
                margin-bottom: 8px;
            }
        }

        /* ===== Scrollbar ===== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: var(--bg-light);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--primary-light);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--primary);
        }

        /* Edit mode */
        .output-content.editing {
            border: 2px solid var(--primary-light);
            box-shadow: 0 0 0 4px rgba(195, 159, 89, 0.15);
        }

        .output-content.editing .manual-output [contenteditable="true"]:hover {
            outline: 2px dashed var(--primary-light);
            outline-offset: 2px;
        }

        .output-content.editing .manual-output [contenteditable="true"]:focus {
            outline: 2px solid var(--primary);
            outline-offset: 2px;
            background: rgba(195, 159, 89, 0.03);
        }

        /* Fullscreen mode */
        .output-panel.fullscreen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 900;
            background: var(--bg-light);
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .output-panel.fullscreen .output-toolbar {
            border-radius: 0;
            margin-bottom: 0;
            border-bottom: 1px solid var(--border);
        }

        .output-panel.fullscreen .output-content {
            flex: 1;
            overflow-y: auto;
            border-radius: 0;
            box-shadow: none;
            padding: 40px 80px;
            max-width: 100%;
        }

        @media print {
            .output-panel.fullscreen {
                position: static;
            }
        }

        .edit-indicator {
            background: var(--primary-gradient);
            color: white;
            font-size: 12px;
            padding: 6px 16px;
            border-radius: 0 0 var(--radius-sm) var(--radius-sm);
            position: sticky;
            top: 0;
            z-index: 10;
            text-align: center;
        }

        .manual-output img.inserted-image {
            max-width: 100%;
            border-radius: var(--radius-sm);
            margin: 16px 0;
            border: 1px solid var(--border);
            cursor: pointer;
        }

        .manual-output img.inserted-image:hover {
            box-shadow: 0 4px 15px var(--shadow);
        }

        .diagram-edit-area {
            margin: 16px 0;
        }

        .diagram-edit-area textarea {
            width: 100%;
            min-height: 150px;
            padding: 16px;
            font-family: 'Consolas', 'Courier New', monospace;
            font-size: 13px;
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            resize: vertical;
            line-height: 1.6;
        }

        .diagram-edit-area textarea:focus {
            outline: none;
            border-color: var(--primary-light);
            box-shadow: 0 0 0 3px rgba(195, 159, 89, 0.1);
        }

        .diagram-edit-actions {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .diagram-edit-actions button {
            padding: 8px 16px;
            border-radius: var(--radius-sm);
            font-size: 13px;
            cursor: pointer;
            transition: var(--transition);
            border: none;
        }

        .btn-rerender {
            background: var(--primary-gradient);
            color: white;
        }

        .btn-rerender:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(195, 159, 89, 0.4);
        }

        .btn-add-img-to-diagram {
            background: var(--bg-light);
            border: 1px solid var(--border) !important;
            color: var(--text-dark);
        }

        .btn-add-img-to-diagram:hover {
            border-color: var(--primary-light) !important;
        }

        .btn-diagram-cancel {
            background: var(--bg-light);
            border: 1px solid var(--border) !important;
            color: var(--text-muted);
        }

        .mermaid-container.editable-hint {
            cursor: pointer;
            transition: var(--transition);
        }

        .mermaid-container.editable-hint:hover {
            outline: 2px dashed var(--primary-light);
            outline-offset: 4px;
        }

        .mermaid-container.editable-hint::after {
            content: 'クリックで図を編集';
            display: block;
            text-align: center;
            font-size: 11px;
            color: var(--primary-light);
            margin-top: 8px;
        }

        .image-wrapper {
            position: relative;
            display: inline-block;
            width: 100%;
            margin: 16px 0;
        }

        .image-wrapper .img-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ef4444;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .image-wrapper:hover .img-delete {
            display: flex;
        }

        .video-wrapper {
            position: relative;
            width: 100%;
            margin: 16px 0;
        }

        .video-wrapper video {
            max-width: 100%;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
        }

        .video-wrapper .vid-delete {
            position: absolute;
            top: 8px;
            right: 8px;
            background: #ef4444;
            color: white;
            border: none;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            font-size: 16px;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 5;
        }

        .video-wrapper:hover .vid-delete {
            display: flex;
        }

        .inline-video-btn {
            display: block;
            margin: 4px 0;
            padding: 4px 12px;
            font-size: 12px;
            color: var(--primary-light);
            background: transparent;
            border: 1px dashed var(--primary-light);
            border-radius: var(--radius-sm);
            cursor: pointer;
            opacity: 0.5;
            transition: var(--transition);
        }

        .inline-video-btn:hover {
            opacity: 1;
            background: rgba(195, 159, 89, 0.08);
        }

        /* Hide mermaid error messages */
        #d-mermaid, [id^="dmermaid"], .error-icon, .mermaid .error-text {
            display: none !important;
        }

        /* Mermaid label nodes (small circles) */
        .mermaid-container svg .node circle {
            fill: #fff8e1 !important;
            stroke: #c39f59 !important;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="header-inner">
            <div>
                <h1 class="logo">LUMOUS</h1>
                <p class="logo-sub">MANUAL DIAGRAM MAKER</p>
            </div>
            <div class="api-key-area">
                <select id="apiProvider" style="padding: 10px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm); font-size: 13px;">
                    <option value="groq">Groq（無料・推奨）</option>
                    <option value="gemini">Gemini</option>
                </select>
                <input type="password" id="apiKeyInput" class="api-key-input" placeholder="APIキーを入力">
                <button class="api-key-save" onclick="saveApiKey()">保存</button>
                <span class="api-status" id="apiStatus">未設定</span>
            </div>
        </div>
    </header>

    <!-- Input Toggle Button -->
    <button class="input-toggle-btn" id="inputToggleBtn" onclick="toggleInputPanel()" title="入力パネル">&#x25B6;</button>

    <!-- Main -->
    <div class="main">
        <!-- Input Panel -->
        <div class="input-panel collapsed" id="inputPanel">
            <div class="panel-card">
                <h3 class="panel-title">図解の種類</h3>
                <div class="diagram-type" id="diagramType">
                    <button class="type-btn selected" data-type="auto">自動判定</button>
                    <button class="type-btn" data-type="flowchart">フローチャート</button>
                    <button class="type-btn" data-type="sequence">シーケンス図</button>
                    <button class="type-btn" data-type="stateDiagram">状態遷移図</button>
                </div>

                <h3 class="panel-title">マニュアル内容を入力</h3>
                <textarea id="inputText" class="input-textarea" placeholder="例：お客様から電話が来たら、まず名前を聞いて、既存顧客か確認。既存なら担当に繋ぐ、新規なら受付フォームに記入してもらう"></textarea>

                <button class="btn-generate" id="generateBtn" onclick="generate()">マニュアルを生成</button>
            </div>

            <!-- Template -->
            <div class="panel-card">
                <h3 class="panel-title">テンプレート</h3>
                <div class="templates">
                    <button class="template-btn" onclick="useTemplate('phone')">電話対応マニュアル</button>
                </div>
            </div>

            <!-- Saved Manuals -->
            <div class="panel-card">
                <div style="display: flex; justify-content: space-between; align-items: center;">
                    <h3 class="panel-title" style="margin-bottom: 0;">保存済みマニュアル</h3>
                    <button class="btn-action" onclick="clearAllSaved()" style="font-size: 11px; padding: 4px 12px;">全削除</button>
                </div>
                <input type="text" id="savedSearch" class="input-field" placeholder="検索..." oninput="renderSavedList()" style="margin-top: 12px; padding: 8px 12px; font-size: 13px;">
                <div class="history-list" id="savedList" style="margin-top: 8px;">
                    <div style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 14px;">まだ保存がありません</div>
                </div>
            </div>

            <!-- Backup -->
            <div class="panel-card">
                <h3 class="panel-title">GitHub バックアップ</h3>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-primary" onclick="backupToGithub()" style="flex:1; padding: 10px; font-size: 13px;">バックアップ</button>
                    <button class="btn-secondary" onclick="restoreFromGithub()" style="flex:1; padding: 10px; font-size: 13px;">復元</button>
                </div>
                <p id="backupStatus" style="font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center;"></p>
            </div>

            <!-- Export / Import -->
            <div class="panel-card">
                <h3 class="panel-title">エクスポート / インポート</h3>
                <p style="font-size: 12px; color: var(--text-muted); margin-bottom: 12px;">全マニュアルをJSONファイルで書き出し・復元できます</p>
                <div style="display: flex; gap: 8px;">
                    <button class="btn-action" onclick="exportAllAsJson()" style="flex:1; padding: 10px; font-size: 13px; background: var(--primary-gradient); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer;">エクスポート</button>
                    <button class="btn-action" onclick="document.getElementById('jsonImportInput').click()" style="flex:1; padding: 10px; font-size: 13px; background: var(--bg-light); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer;">インポート</button>
                </div>
                <input type="file" id="jsonImportInput" accept=".json" style="display:none;" onchange="importFromJson(event)">
                <p id="exportStatus" style="font-size: 11px; color: var(--text-muted); margin-top: 8px; text-align: center;"></p>
            </div>
        </div>

        <!-- Output Panel -->
        <div class="output-panel">
            <div class="output-toolbar" id="outputToolbar">
                <button class="btn-icon" onclick="toggleFullscreen()" id="fullscreenBtn" style="display:none;"><span>&#x26F6;</span><span class="tooltip">全画面</span></button>
                <button class="btn-icon" onclick="toggleDiagramText()" id="toggleBtn" style="display:none;"><span>&#x1F504;</span><span class="tooltip">図 / テキスト</span></button>
                <div class="toolbar-sep"></div>
                <button class="btn-icon" onclick="toggleEdit()" id="editBtn" style="display:none;"><span>&#x270F;</span><span class="tooltip">編集</span></button>
                <button class="btn-icon" onclick="addImage()" id="imgBtn" style="display:none;"><span>&#x1F5BC;</span><span class="tooltip">画像追加</span></button>
                <button class="btn-icon" onclick="addVideo()" id="videoBtn" style="display:none;"><span>&#x1F3AC;</span><span class="tooltip">動画追加</span></button>
                <div class="toolbar-sep"></div>
                <button class="btn-icon" onclick="downloadManualAsHtml()" id="downloadHtmlBtn"><span>&#x1F4E5;</span><span class="tooltip">HTMLダウンロード</span></button>
                <button class="btn-icon" onclick="printManual()"><span>&#x1F5A8;</span><span class="tooltip">印刷 / PDF</span></button>
                <button class="btn-icon" onclick="copyManual()"><span>&#x1F4CB;</span><span class="tooltip">コピー</span></button>
                <div class="btn-save-group">
                    <button class="btn-save primary" onclick="saveManual()" id="saveBtn" style="display:none;">新規保存</button>
                    <button class="btn-save secondary" onclick="openOverwriteModal()" id="overwriteBtn" style="display:none;">上書き</button>
                </div>
            </div>
            <input type="file" id="imageInput" accept="image/*" style="display:none;" onchange="handleImageUpload(event)">
            <input type="file" id="videoInput" accept="video/*" style="display:none;" onchange="handleVideoUpload(event)">

            <div class="output-content" id="outputContent">
                <div class="output-placeholder">
                    <div class="output-placeholder-icon">&#128196;</div>
                    <p>左の「▶」ボタンで入力パネルを開き<br>マニュアルの内容を入力して生成してください</p>
                    <p style="font-size: 13px;">AIが自動で図解付きマニュアルを作成します</p>
                </div>
            </div>
        </div>

        <!-- Link Panel (Right) -->
        <div class="link-panel">
            <div class="panel-card">
                <h3 class="panel-title">リンク一覧 <span class="link-badge" id="linkCount">0</span></h3>
                <div class="link-list" id="linkList">
                    <div class="link-empty">リンクはまだありません</div>
                </div>
                <div class="link-add-form">
                    <input type="text" id="linkAddName" placeholder="リンク名">
                    <input type="text" id="linkAddUrl" placeholder="URL (https://...)">
                    <button class="link-add-btn" onclick="addManualLink()">+ リンクを追加</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Overwrite Modal -->
    <div id="overwriteModalOverlay" style="position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:1000;">
        <div style="background:var(--bg-white);border-radius:var(--radius);padding:32px;width:100%;max-width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.3);">
            <!-- Step 1: Select -->
            <div id="overwriteStep1">
                <h2 style="font-size:20px;font-weight:300;color:var(--primary);margin-bottom:20px;letter-spacing:1px;">上書き先を選択</h2>
                <input type="text" id="overwriteSearch" class="input-field" placeholder="検索..." oninput="renderOverwriteList()" style="margin-bottom:12px;padding:10px 14px;font-size:13px;">
                <div id="overwriteList" style="display:flex;flex-direction:column;gap:8px;max-height:400px;overflow-y:auto;"></div>
            </div>
            <!-- Step 2: Confirm -->
            <div id="overwriteStep2" style="display:none;">
                <h2 style="font-size:20px;font-weight:300;color:var(--primary);margin-bottom:20px;letter-spacing:1px;">上書き確認</h2>
                <div id="overwriteConfirmInfo" style="padding:16px;background:var(--bg-light);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:20px;">
                </div>
                <p style="font-size:13px;color:var(--text-muted);margin-bottom:20px;">このマニュアルを現在の内容で上書きします。よろしいですか？</p>
                <div style="display:flex;gap:8px;justify-content:flex-end;">
                    <button class="btn-action" onclick="overwriteGoBack()" style="padding:10px 20px;">戻る</button>
                    <button class="btn-save primary" onclick="overwriteConfirm()" style="padding:10px 24px;font-size:14px;">OK - 上書き保存</button>
                </div>
            </div>
            <div id="overwriteFooter" style="display:flex;justify-content:flex-end;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);">
                <button class="btn-action" onclick="closeOverwriteModal()">キャンセル</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ===== Init =====
        mermaid.initialize({
            startOnLoad: false,
            securityLevel: 'loose',
            theme: 'base',
            themeVariables: {
                primaryColor: '#c39f59',
                primaryBorderColor: '#8b6f47',
                primaryTextColor: '#333',
                lineColor: '#8b6f47',
                secondaryColor: '#f8f9fa',
                tertiaryColor: '#fff8e1',
                fontFamily: 'Segoe UI, Hiragino Sans, Meiryo, sans-serif'
            }
        });

        let selectedType = 'auto';
        let savedManuals = JSON.parse(localStorage.getItem('lumous-saved-manuals') || '[]');
        let currentHtml = '';
        let currentMermaidCodes = [];
        let diagramVisible = true;
        let editMode = false;
        let _inlineVideoTarget = null;
        let _inlineImageTarget = null;
        let manualLinks = [];
        let linkNameOverrides = JSON.parse(localStorage.getItem('lumous-link-names') || '{}');

        // ===== IndexedDB for video storage =====
        let videoDB = null;
        function openVideoDB() {
            return new Promise((resolve, reject) => {
                if (videoDB) { resolve(videoDB); return; }
                const req = indexedDB.open('lumous-videos', 1);
                req.onupgradeneeded = e => { e.target.result.createObjectStore('videos'); };
                req.onsuccess = e => { videoDB = e.target.result; resolve(videoDB); };
                req.onerror = e => reject(e);
            });
        }
        async function saveVideoToDB(id, dataUrl) {
            const db = await openVideoDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('videos', 'readwrite');
                tx.objectStore('videos').put(dataUrl, id);
                tx.oncomplete = () => resolve();
                tx.onerror = e => reject(e);
            });
        }
        async function getVideoFromDB(id) {
            const db = await openVideoDB();
            return new Promise((resolve, reject) => {
                const tx = db.transaction('videos', 'readonly');
                const req = tx.objectStore('videos').get(id);
                req.onsuccess = () => resolve(req.result);
                req.onerror = e => reject(e);
            });
        }
        async function deleteVideoFromDB(id) {
            const db = await openVideoDB();
            return new Promise((resolve) => {
                const tx = db.transaction('videos', 'readwrite');
                tx.objectStore('videos').delete(id);
                tx.oncomplete = () => resolve();
            });
        }

        // Strip video data URLs from HTML, save them to IndexedDB, return clean HTML
        async function stripVideosForStorage(html) {
            const tempEl = document.createElement('div');
            tempEl.innerHTML = html;
            const videos = tempEl.querySelectorAll('.video-wrapper video');
            for (const video of videos) {
                const src = video.getAttribute('src');
                if (src && src.startsWith('data:')) {
                    const vid = 'vid_' + Date.now() + '_' + Math.random().toString(36).substr(2, 6);
                    await saveVideoToDB(vid, src);
                    video.setAttribute('src', '');
                    video.setAttribute('data-video-id', vid);
                }
            }
            return tempEl.innerHTML;
        }

        // Restore video data URLs from IndexedDB into HTML
        async function restoreVideosInElement(container) {
            const videos = container.querySelectorAll('video[data-video-id]');
            for (const video of videos) {
                const vid = video.getAttribute('data-video-id');
                if (vid) {
                    const dataUrl = await getVideoFromDB(vid);
                    if (dataUrl) {
                        video.setAttribute('src', dataUrl);
                    }
                }
            }
        }

        // サーバーにデータを自動同期
        async function syncToServer() {
            try {
                const data = {
                    savedManuals: savedManuals,
                    apiProvider: localStorage.getItem('lumous-api-provider')
                };
                await fetch('/api/backup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
            } catch (e) {
                console.error('サーバー同期エラー:', e);
            }
        }

        // Load API key + サーバーからデータ復元
        window.addEventListener('DOMContentLoaded', async () => {
            const savedProvider = localStorage.getItem('lumous-api-provider') || 'groq';
            const savedKey = localStorage.getItem('lumous-api-key');
            document.getElementById('apiProvider').value = savedProvider;
            if (savedKey) {
                document.getElementById('apiKeyInput').value = savedKey;
                document.getElementById('apiStatus').textContent = '設定済み';
                document.getElementById('apiStatus').classList.add('connected');
            }

            // localStorageが空ならサーバーから復元、データがあればサーバーに同期
            if (savedManuals.length === 0) {
                try {
                    const response = await fetch('/api/restore');
                    const data = await response.json();
                    if (data && data.savedManuals && data.savedManuals.length > 0) {
                        savedManuals = data.savedManuals;
                        localStorage.setItem('lumous-saved-manuals', JSON.stringify(savedManuals));
                        if (data.apiProvider) {
                            localStorage.setItem('lumous-api-provider', data.apiProvider);
                            document.getElementById('apiProvider').value = data.apiProvider;
                        }
                        console.log('サーバーから ' + savedManuals.length + ' 件のマニュアルを復元しました');
                    }
                } catch (e) {
                    console.error('サーバーからの復元エラー:', e);
                }
            } else {
                // localStorageにデータがある場合はサーバーに同期
                syncToServer();
            }

            renderSavedList();
        });

        // ===== API Key =====
        function saveApiKey() {
            const key = document.getElementById('apiKeyInput').value.replace(/[^\x20-\x7E]/g, '').trim();
            const provider = document.getElementById('apiProvider').value;
            if (!key) {
                showToast('APIキーを入力してください');
                return;
            }
            localStorage.setItem('lumous-api-key', key);
            localStorage.setItem('lumous-api-provider', provider);
            document.getElementById('apiStatus').textContent = '設定済み';
            document.getElementById('apiStatus').classList.add('connected');
            showToast('APIキーを保存しました');
        }

        // ===== Diagram Type =====
        document.getElementById('diagramType').addEventListener('click', (e) => {
            if (e.target.classList.contains('type-btn')) {
                document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
                e.target.classList.add('selected');
                selectedType = e.target.dataset.type;
            }
        });

        // ===== Templates =====
        const templates = {
            phone: 'お客様から電話が来たら、まず会社名と名前を聞きます。次に用件を確認し、既存顧客かどうかをシステムで検索します。既存顧客の場合は担当者に取り次ぎます。担当者が不在の場合は折り返し連絡先を聞いてメモを残します。新規のお客様の場合は、受付フォームに情報を記入してもらい、担当部署に連絡します。'
        };

        function useTemplate(key) {
            document.getElementById('inputText').value = templates[key];
        }

        // ===== Generate =====
        async function generate() {
            const apiKey = (localStorage.getItem('lumous-api-key') || '').replace(/[^\x20-\x7E]/g, '').trim();
            const provider = localStorage.getItem('lumous-api-provider') || 'groq';
            if (!apiKey) {
                showToast('先にAPIキーを設定してください');
                return;
            }

            const input = document.getElementById('inputText').value.trim();
            if (!input) {
                showToast('マニュアル内容を入力してください');
                return;
            }

            const btn = document.getElementById('generateBtn');
            btn.disabled = true;
            btn.classList.add('loading');
            btn.textContent = '';

            try {
                const diagramInstruction = selectedType === 'auto'
                    ? '内容に最適な図の種類を自動で選んでください。'
                    : `図の種類は ${selectedType} を使用してください。`;

                const prompt = `あなたはマニュアル作成の専門家です。以下の内容から、図解付きの分かりやすいマニュアルをHTML形式で作成してください。

【重要: Mermaid図解のルール】
- 図解は必ず1つだけ含めてください（複数不要）
- ${diagramInstruction}
- Mermaidコードは <div class="mermaid-container"><pre class="mermaid">...</pre></div> で囲んでください
- 必ず以下のルールを守ってください:
  * flowchart TD または flowchart LR で始めること
  * ノードIDは英語のみ使用（例: A, B, C, step1, step2）
  * 日本語テキストは必ず角括弧で囲む（例: A[電話を受ける]）
  * 条件分岐は波括弧を使う（例: C{既存顧客か}）
  * 矢印は --> を使う
  * 条件分岐からの矢印には必ず -->|はい| と -->|いいえ| のラベルを付けて、どちらがYesでどちらがNoか明確にする
  * ラベルの中に特殊文字やコロンは使わない（はい、いいえ、OK、NG など短い日本語のみ）
  * 丸括弧()は絶対に使わない
  * セミコロン;は絶対に使わない
  * 特殊文字「」『』（）を図の中で使わない
  * 各行は1つの接続だけにする
  * subgraphを使わない
  * 同じノードから同じラベルで複数の矢印を出さない（例: E -->|はい| F と E -->|はい| G は禁止。F --> G のように直列にする）
  * 条件分岐{...}からは必ず2本の矢印を出し、それぞれ -->|はい| と -->|いいえ| を付ける
  * 分岐後のノードには具体的な行動を書く（例: ×「次へ進む」 ○「クリックポストでラベル印刷」）
  * フローは上から下へ、最後に完了ノードを入れる
  * 各ノードのテキストの先頭に内容に合った絵文字を必ず付ける。以下を参考に:
    お客様/人/担当者 → 👤, 電話 → 📞, メール → 📧, 確認/チェック → ✅, 書類/フォーム/記入 → 📝, 検索/調べる → 🔍, 連絡/通知 → 📢, 承認/OK → ✅, 却下/NG → ❌, 開始 → ▶️, 完了/終了 → ✔️, 判断/分岐 → ❓, 報告 → 📊, 設定/PC → 💻, 保存 → 💾, 会議/相談 → 🤝, 注意/警告 → ⚠️, 待機 → ⏳, 部署/チーム → 🏢, 上司 → 👔, 研修/学習 → 📚, 面談 → 🗣️
    上記にないものも内容に合う絵文字を自由に選んでください

正しいMermaidの例:
<div class="mermaid-container"><pre class="mermaid">
graph TD
    A[📞 電話を受ける] --> B[👤 名前を聞く]
    B --> C{🔍 既存顧客か}
    C -->|はい| D[✅ 担当者に繋ぐ]
    C -->|いいえ| E[📝 受付フォームに記入]
    D --> F{📞 担当者は在席か}
    F -->|はい| G[🤝 電話を転送]
    F -->|いいえ| H[📝 折り返し連絡先を聞く]
</pre></div>

【HTML構造のルール】
- 見出しは <h1>, <h2>, <h3> を使う
- 手順は <div class="step-box">...</div> で囲む
- 注意事項は <div class="note-box">...</div> で囲む
- 警告は <div class="warning-box">...</div> で囲む
- 表が必要な場合は <table> を使う
- HTMLタグのみ出力（<html>や<body>タグは不要、markdownのコードブロックも不要）
- 日本語で作成
- 分かりやすく、誰でも理解できる言葉で書く
- テキスト内にURLがある場合は必ず <a href="URL" target="_blank">URL</a> としてクリック可能なリンクにする

${input}`;

                let html = '';

        // ===== Fix Mermaid Code =====
        function fixMermaidCode(code) {
            let fixed = code.trim();
            // Remove markdown fences
            fixed = fixed.replace(/^```mermaid\s*/i, '').replace(/```\s*$/, '');
            // Replace fullwidth characters
            fixed = fixed.replace(/（/g, ' ').replace(/）/g, ' ');
            fixed = fixed.replace(/「/g, '').replace(/」/g, '');
            fixed = fixed.replace(/『/g, '').replace(/』/g, '');
            // Remove semicolons
            fixed = fixed.replace(/;/g, '');
            // Convert flowchart to graph
            fixed = fixed.replace(/^flowchart\s+(TD|LR|TB|BT|RL)/m, 'graph $1');
            if (!fixed.match(/^(graph|sequenceDiagram|stateDiagram|mindmap|gantt|pie|classDiagram)/)) {
                fixed = 'graph TD\n' + fixed;
            }
            return fixed;
        }

        // ===== Render Mermaid =====
        async function renderMermaidDiagrams() {
            const elements = document.querySelectorAll('.manual-output .mermaid');
            for (let i = 0; i < elements.length; i++) {
                const el = elements[i];
                const code = fixMermaidCode(el.textContent);
                console.log('Mermaid code:', code);
                try {
                    const { svg } = await mermaid.render(`mm${Date.now()}${i}`, code);
                    el.innerHTML = svg;
                } catch (e) {
                    console.warn('Mermaid render error:', e, '\nCode:', code);
                    el.parentElement.innerHTML = `<pre style="background:#f8f9fa; padding:16px; border-radius:8px; font-size:13px; white-space:pre-wrap; border-left:4px solid #c39f59;">${code.replace(/</g,'&lt;')}</pre>`;
                }
            }
        }

        // ===== Save Manual =====
        async function saveManual() {
            // If in edit mode, capture latest content
            const manualOutput = document.querySelector('.manual-output');
            if (manualOutput) {
                currentHtml = manualOutput.innerHTML;
            }
            if (!currentHtml) {
                showToast('保存するマニュアルがありません');
                return;
            }

            // Replace rendered SVGs back to mermaid code for clean storage
            const tempEl = document.createElement('div');
            tempEl.innerHTML = currentHtml;
            const containers = tempEl.querySelectorAll('.mermaid-container');
            containers.forEach((container, i) => {
                const code = currentMermaidCodes[i] || '';
                if (code) {
                    container.innerHTML = '<pre class="mermaid">' + code + '</pre>';
                }
            });
            tempEl.querySelectorAll('.edit-indicator, .inline-video-btn').forEach(el => el.remove());

            // Save videos to IndexedDB, strip data URLs
            const cleanHtml = await stripVideosForStorage(tempEl.innerHTML);
            const temp2 = document.createElement('div');
            temp2.innerHTML = cleanHtml;
            const h1 = temp2.querySelector('h1');
            const title = h1 ? h1.textContent.trim() : document.getElementById('inputText').value.substring(0, 30);

            const item = {
                id: Date.now(),
                title: title,
                input: document.getElementById('inputText').value,
                html: cleanHtml,
                mermaidCodes: currentMermaidCodes,
                date: new Date().toLocaleDateString('ja-JP')
            };
            savedManuals.unshift(item);
            try {
                localStorage.setItem('lumous-saved-manuals', JSON.stringify(savedManuals));
            } catch (e) {
                console.error('localStorage save error:', e);
                showToast('保存エラー: ストレージ容量不足の可能性があります');
                savedManuals.shift();
                return;
            }
            renderSavedList();
            syncToServer();
            showToast('マニュアルを保存しました');
        }

        function renderSavedList() {
            const container = document.getElementById('savedList');
            const searchInput = document.getElementById('savedSearch');
            const query = searchInput ? searchInput.value.trim().toLowerCase() : '';

            let filtered = savedManuals;
            if (query) {
                filtered = savedManuals.filter(item =>
                    item.title.toLowerCase().includes(query) ||
                    (item.input && item.input.toLowerCase().includes(query))
                );
            }

            if (savedManuals.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 14px;">まだ保存がありません</div>';
                return;
            }
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align: center; padding: 20px; color: var(--text-muted); font-size: 14px;">該当するマニュアルがありません</div>';
                return;
            }
            container.innerHTML = filtered.map(item => `
                <div class="history-item" onclick="loadSaved(${item.id})">
                    <div>
                        <div class="history-title">${item.title}</div>
                        <div class="history-date">${item.date}</div>
                    </div>
                    <div class="history-actions">
                        <button class="history-rename" onclick="event.stopPropagation(); renameSaved(${item.id})" title="名前を変更">✏</button>
                        <button class="history-delete" onclick="event.stopPropagation(); deleteSaved(${item.id})">×</button>
                    </div>
                </div>
            `).join('');
        }

        async function loadSaved(id) {
            const item = savedManuals.find(h => h.id === id);
            if (!item) return;
            document.getElementById('inputText').value = item.input;
            currentHtml = item.html;
            currentMermaidCodes = item.mermaidCodes || [];
            diagramVisible = true;
            const output = document.getElementById('outputContent');
            output.innerHTML = '<div class="manual-output">' + item.html + '</div>';
            await renderMermaidDiagrams();
            // Restore videos from IndexedDB
            const manualOutput = output.querySelector('.manual-output');
            if (manualOutput) await restoreVideosInElement(manualOutput);
            document.getElementById('saveBtn').style.display = '';
            document.getElementById('toggleBtn').style.display = '';
            document.getElementById('editBtn').style.display = '';
            document.getElementById('imgBtn').style.display = '';
            document.getElementById('fullscreenBtn').style.display = '';
            document.getElementById('videoBtn').style.display = '';
            document.getElementById('overwriteBtn').style.display = savedManuals.length > 0 ? '' : 'none';
            showToast('マニュアルを読み込みました');
            refreshAutoLinks();
        }

        function deleteSaved(id) {
            savedManuals = savedManuals.filter(h => h.id !== id);
            localStorage.setItem('lumous-saved-manuals', JSON.stringify(savedManuals));
            renderSavedList();
            syncToServer();
            showToast('削除しました');
        }

        function renameSaved(id) {
            const item = savedManuals.find(h => h.id === id);
            if (!item) return;
            const newName = prompt('新しい名前を入力してください', item.title);
            if (newName === null || newName.trim() === '') return;
            item.title = newName.trim();
            localStorage.setItem('lumous-saved-manuals', JSON.stringify(savedManuals));
            renderSavedList();
            syncToServer();
            showToast('名前を変更しました');
        }

        function clearAllSaved() {
            if (!confirm('保存済みマニュアルをすべて削除しますか？')) return;
            savedManuals = [];
            localStorage.setItem('lumous-saved-manuals', JSON.stringify(savedManuals));
            renderSavedList();
            syncToServer();
            showToast('すべて削除しました');
        }

        // ===== Input Panel Toggle =====
        function toggleInputPanel() {
            const panel = document.getElementById('inputPanel');
            const btn = document.getElementById('inputToggleBtn');
            panel.classList.toggle('collapsed');
            btn.innerHTML = panel.classList.contains('collapsed') ? '&#x25B6;' : '&#x25C0;';
        }

        // ===== Link Panel =====
        function extractLinksFromHtml(html) {
            const temp = document.createElement('div');
            temp.innerHTML = html;
            const links = [];
            const seen = new Set();
            temp.querySelectorAll('a[href]').forEach(a => {
                const url = a.getAttribute('href');
                if (url && url.match(/^https?:\/\//) && !seen.has(url)) {
                    seen.add(url);
                    const name = a.textContent.trim();
                    links.push({
                        name: (name && name !== url) ? name : '',
                        url: url,
                        auto: true
                    });
                }
            });
            return links;
        }

        function updateLinkPanel() {
            const container = document.getElementById('linkList');
            const badge = document.getElementById('linkCount');
            if (manualLinks.length === 0) {
                container.innerHTML = '<div class="link-empty">リンクはまだありません</div>';
                badge.textContent = '0';
                return;
            }
            badge.textContent = manualLinks.length;
            container.innerHTML = manualLinks.map((link, i) => `
                <div class="link-item">
                    <div style="flex:1;min-width:0;">
                        <div class="link-item-name" style="display:flex;align-items:center;gap:4px;">
                            <span>${link.name || '(名前なし)'}</span>
                            <button class="link-item-delete" onclick="event.stopPropagation(); renameLink(${i})" title="名前を編集" style="font-size:12px;">✏</button>
                        </div>
                        <a href="${link.url}" target="_blank" title="${link.url}">${link.url}</a>
                    </div>
                    <button class="link-item-delete" onclick="removeLink(${i})" title="削除">×</button>
                </div>
            `).join('');
        }

        function refreshAutoLinks() {
            const autoLinks = extractLinksFromHtml(currentHtml);
            // Apply saved name overrides to auto links
            autoLinks.forEach(link => {
                if (link.url in linkNameOverrides) {
                    link.name = linkNameOverrides[link.url];
                }
            });
            // Keep manual links, replace auto links
            const manual = manualLinks.filter(l => !l.auto);
            manualLinks = [...autoLinks, ...manual];
            updateLinkPanel();
        }

        function addManualLink() {
            const nameInput = document.getElementById('linkAddName');
            const urlInput = document.getElementById('linkAddUrl');
            const name = nameInput.value.trim();
            const url = urlInput.value.trim();
            if (!url) {
                showToast('URLを入力してください');
                return;
            }
            if (!url.match(/^https?:\/\//)) {
                showToast('URLはhttps://で始めてください');
                return;
            }
            manualLinks.push({ name: name || '', url: url, auto: false });
            nameInput.value = '';
            urlInput.value = '';
            updateLinkPanel();
            showToast('リンクを追加しました');
        }

        function removeLink(index) {
            manualLinks.splice(index, 1);
            updateLinkPanel();
        }

        function renameLink(index) {
            const link = manualLinks[index];
            if (!link) return;
            const newName = prompt('リンク名を入力してください', link.name || '');
            if (newName === null) return;
            link.name = newName.trim();
            // Save name override so it persists across refreshes
            linkNameOverrides[link.url] = link.name;
            localStorage.setItem('lumous-link-names', JSON.stringify(linkNameOverrides));
            updateLinkPanel();
            showToast('リンク名を変更しました');
        }

        // ===== Overwrite Existing Manual =====
        let _overwriteTargetId = null;

        function openOverwriteModal() {
            if (savedManuals.length === 0) {
                showToast('保存済みマニュアルがありません');
                return;
            }
            _overwriteTargetId = null;
            document.getElementById('overwriteModalOverlay').style.display = 'flex';
            document.getElementById('overwriteSearch').value = '';
            document.getElementById('overwriteStep1').style.display = '';
            document.getElementById('overwriteStep2').style.display = 'none';
            document.getElementById('overwriteFooter').style.display = '';
            renderOverwriteList();
        }

        function closeOverwriteModal() {
            document.getElementById('overwriteModalOverlay').style.display = 'none';
            _overwriteTargetId = null;
        }

        function renderOverwriteList() {
            const container = document.getElementById('overwriteList');
            const query = (document.getElementById('overwriteSearch').value || '').trim().toLowerCase();
            let filtered = savedManuals;
            if (query) {
                filtered = savedManuals.filter(item =>
                    item.title.toLowerCase().includes(query) ||
                    (item.input && item.input.toLowerCase().includes(query))
                );
            }
            if (filtered.length === 0) {
                container.innerHTML = '<div style="text-align:center;padding:20px;color:var(--text-muted);">該当なし</div>';
                return;
            }
            container.innerHTML = filtered.map(item => `
                <div class="history-item" onclick="selectOverwriteTarget(${item.id})" style="cursor:pointer;">
                    <div>
                        <div class="history-title">${item.title}</div>
                        <div class="history-date">${item.date}</div>
                    </div>
                </div>
            `).join('');
        }

        function selectOverwriteTarget(id) {
            const item = savedManuals.find(h => h.id === id);
            if (!item) return;
            _overwriteTargetId = id;
            document.getElementById('overwriteStep1').style.display = 'none';
            document.getElementById('overwriteFooter').style.display = 'none';
            document.getElementById('overwriteStep2').style.display = '';
            document.getElementById('overwriteConfirmInfo').innerHTML = `
                <div style="font-weight:600;font-size:15px;margin-bottom:6px;">${item.title}</div>
                <div style="font-size:12px;color:var(--text-muted);">保存日: ${item.date}</div>
            `;
        }

        function overwriteGoBack() {
            _overwriteTargetId = null;
            document.getElementById('overwriteStep2').style.display = 'none';
            document.getElementById('overwriteStep1').style.display = '';
            document.getElementById('overwriteFooter').style.display = '';
        }

        async function overwriteConfirm() {
            try {
                if (!_overwriteTargetId) { closeOverwriteModal(); return; }
                const item = savedManuals.find(h => h.id === _overwriteTargetId);
                if (!item) { closeOverwriteModal(); showToast('対象が見つかりません'); return; }

                const manualOutput = document.querySelector('.manual-output');
                if (!manualOutput) { closeOverwriteModal(); showToast('内容がありません'); return; }

                const tempEl = document.createElement('div');
                tempEl.innerHTML = manualOutput.innerHTML;
                tempEl.querySelectorAll('.mermaid-container').forEach((container, i) => {
                    const code = currentMermaidCodes[i] || '';
                    if (code) {
                        container.innerHTML = '<pre class="mermaid">' + code + '</pre>';
                    }
                });
                tempEl.querySelectorAll('.edit-indicator, .inline-video-btn').forEach(el => el.remove());

                // Save videos to IndexedDB, strip data URLs
                const cleanHtml = await stripVideosForStorage(tempEl.innerHTML);
                const temp2 = document.createElement('div');
                temp2.innerHTML = cleanHtml;

                const h1 = temp2.querySelector('h1');
                item.title = h1 ? h1.textContent.trim() : item.title;
                item.html = cleanHtml;
                item.input = document.getElementById('inputText').value;
                item.mermaidCodes = currentMermaidCodes;
                item.date = new Date().toLocaleDateString('ja-JP');

                localStorage.setItem('lumous-saved-manuals', JSON.stringify(savedManuals));
                renderSavedList();
                syncToServer();
                showToast('上書き保存しました');
            } catch (e) {
                console.error('overwriteConfirm error:', e);
                showToast('エラー: ' + e.message);
            } finally {
                closeOverwriteModal();
            }
        }

        // ===== Download as HTML =====
        async function downloadManualAsHtml() {
            const manualOutput = document.querySelector('.manual-output');
            if (!manualOutput) { showToast('ダウンロードするマニュアルがありません'); return; }

            const clone = manualOutput.cloneNode(true);
            // Remove edit-mode artifacts
            clone.querySelectorAll('.edit-indicator, .inline-video-btn, .vid-delete, .img-delete').forEach(el => el.remove());
            // Restore videos from IndexedDB into clone (embeds as data URLs - file may be large)
            await restoreVideosInElement(clone);
            // Remove "mermaid" class from already-rendered <pre> tags so mermaid.initialize doesn't try to re-render them
            clone.querySelectorAll('pre.mermaid').forEach(pre => {
                if (pre.querySelector('svg')) {
                    pre.classList.remove('mermaid');
                }
            });

            const title = (clone.querySelector('h1') || {}).textContent || 'マニュアル';

            const dlStyles = `

            const htmlContent = '<!DOCTYPE html>\n<html lang="ja">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<title>' + title.trim() + '</title>\n' +

                '<style>\n' + dlStyles + '</style>\n</head>\n<body>\n' +
                '<div class="manual-output">\n' + clone.innerHTML + '\n</div>\n' +
                '<script>mermaid.initialize({startOnLoad:true, theme:"base", themeVariables:{primaryColor:"#c39f59",primaryBorderColor:"#8b6f47",primaryTextColor:"#333",lineColor:"#8b6f47"}});<\/script>\n' +
                '</body>\n</html>';

            const fileName = title.trim().replace(/[\/\\:*?"<>|]/g, '_') + '.html';
            const sizeMB = (htmlContent.length / 1024 / 1024).toFixed(1);
            if (htmlContent.length > 50 * 1024 * 1024) {
                if (!confirm('ファイルサイズが約' + sizeMB + 'MBと大きいです。ダウンロードを続行しますか？')) return;

            try {

                });
                if (!resp.ok) throw new Error('サーバーエラー');
                const blob = await resp.blob();
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;

                a.click();

                console.error('Download error:', e);
                // Fallback: open in new tab
                const blob = new Blob([htmlContent], { type: 'text/html; charset=utf-8' });
                const url = URL.createObjectURL(blob);
                window.open(url, '_blank');
                showToast('新しいタブで開きました（右クリック→保存で保存できます）');
            }
        }

        // ===== JSON Export / Import =====
        async function exportAllAsJson() {
            if (savedManuals.length === 0) {
                showToast('エクスポートするマニュアルがありません');
                return;
            }

            // Include video data from IndexedDB
            const exportData = {
                version: 1,
                exportDate: new Date().toISOString(),
                apiProvider: localStorage.getItem('lumous-api-provider') || 'groq',
                manuals: []
            };

            for (const manual of savedManuals) {
                const m = Object.assign({}, manual);
                // Extract video IDs from html and include video data
                const tempEl = document.createElement('div');
                tempEl.innerHTML = m.html;
                const videoEls = tempEl.querySelectorAll('video[data-video-id]');
                m.videos = {};
                for (const v of videoEls) {
                    const vid = v.getAttribute('data-video-id');
                    if (vid) {
                        try {
                            const data = await getVideoFromDB(vid);
                            if (data) m.videos[vid] = data;
                        } catch (e) { /* skip missing videos */ }
                    }
                }
                exportData.manuals.push(m);
            }

            const json = JSON.stringify(exportData, null, 2);
            const blob = new Blob([json], { type: 'application/json; charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'lumous-manuals-' + new Date().toISOString().slice(0, 10) + '.json';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);

            document.getElementById('exportStatus').textContent = savedManuals.length + '件のマニュアルをエクスポートしました';
            showToast('JSONファイルをダウンロードしました');
        }

        async function importFromJson(event) {
            const file = event.target.files[0];
            if (!file) return;
            event.target.value = '';

            try {
                const text = await file.text();
                const data = JSON.parse(text);

                if (!data.manuals || !Array.isArray(data.manuals)) {
                    showToast('無効なファイル形式です');
                    return;
                }

                const count = data.manuals.length;
                if (!confirm(count + '件のマニュアルをインポートします。既存のマニュアルに追加されます。よろしいですか？')) return;

                // Restore videos to IndexedDB
                for (const m of data.manuals) {
                    if (m.videos) {
                        for (const [vid, dataUrl] of Object.entries(m.videos)) {
                            await saveVideoToDB(vid, dataUrl);
                        }
                        delete m.videos;
                    }
                }

                // Merge: add imported manuals, skip duplicates by id
                const existingIds = new Set(savedManuals.map(m => m.id));
                let added = 0;
                for (const m of data.manuals) {
                    if (!existingIds.has(m.id)) {
                        savedManuals.push(m);
                        added++;
                    }
                }

                localStorage.setItem('lumous-saved-manuals', JSON.stringify(savedManuals));
                renderSavedList();
                syncToServer();
                document.getElementById('exportStatus').textContent = added + '件追加（' + (count - added) + '件は既存のためスキップ）';
                showToast(added + '件のマニュアルをインポートしました');
            } catch (e) {
                console.error('Import error:', e);
                showToast('インポートエラー: ' + e.message);
            }
        }
